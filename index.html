<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PARTY PEOPLE CODE SONG</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top,#3b0066,#000);
color:white;
padding:20px;
overflow-x:hidden;
}

.container{
max-width:900px;
margin:auto;
}

.title{
text-align:center;
margin-bottom:35px;
}

.title h1{
font-size:52px;
color:#ff00ff;
text-shadow:
0 0 10px #ff00ff,
0 0 20px #ff00ff,
0 0 40px #ff00ff;
}

.title p{
color:#bbb;
margin-top:10px;
font-size:16px;
}

#search{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:15px;
background:#111;
color:white;
font-size:16px;
margin-bottom:25px;
border:1px solid #333;
}

.song{
background:rgba(20,20,20,0.92);
border:1px solid #2d2d2d;
border-radius:18px;
padding:20px;
margin-bottom:18px;
transition:0.25s;
box-shadow:0 0 15px rgba(255,0,255,0.08);
}

.song:hover{
transform:translateY(-4px) scale(1.01);
border-color:#ff00ff;
box-shadow:
0 0 15px rgba(255,0,255,0.4),
0 0 25px rgba(0,255,255,0.15);
}

.song h2{
font-size:22px;
color:#00ffff;
margin-bottom:10px;
}

.song p{
color:#ddd;
margin-bottom:15px;
}

button{
background:linear-gradient(90deg,#ff00ff,#00ffff);
border:none;
padding:12px 22px;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.footer{
text-align:center;
margin-top:35px;
color:#777;
}

</style>
</head>
<body>

<div class="container">

</div>

<input type="text" id="search" placeholder="Search music...">

Website by NaiO

const songsContainer = document.getElementById("songs");

function renderSongs(filter=""){

songsContainer.innerHTML="";

const songs = songData.trim().split("\n");

songs.forEach(song=>{

const [title,id]=song.split("|");

if(title.toLowerCase().includes(filter.toLowerCase())){

songsContainer.innerHTML += `
<div class="song">
<h2>${title}</h2>
<p>ID : ${id}</p>
<button onclick="copyCode('${id}')">COPY</button>
</div>
`;

}

});

}

renderSongs();

document.getElementById("search").addEventListener("keyup",e=>{
renderSongs(e.target.value);
});

function copyCode(code){
navigator.clipboard.writeText(code);
alert("Copied : " + code);
}

</script>
